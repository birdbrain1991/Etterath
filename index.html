<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Etterath — Under Construction</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  background: #000;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* Diagonal warning stripe banner — top */
.stripe-bar {
  position: fixed;
  left: -10%; width: 120%;
  height: 72px;
  background: repeating-linear-gradient(
    -45deg,
    #f5e050 0px,
    #f5e050 40px,
    #fff    40px,
    #fff    80px
  );
  box-shadow: 0 4px 0 #000, 0 8px 0 rgba(255,255,255,0.05);
}
.stripe-bar.top    { top: 0; }
.stripe-bar.bottom { bottom: 0; }

/* Center text */
.content {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 18px;
  animation: fadein 1.2s ease both;
}

.label {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(11px, 1.4vw, 16px);
  letter-spacing: 10px;
  color: rgba(245, 224, 80, 0.45);
  text-transform: uppercase;
}

.title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(52px, 10vw, 130px);
  letter-spacing: 12px;
  color: #fff;
  line-height: 1;
  text-align: center;
  /* Stripe texture clipped into text */
  background: repeating-linear-gradient(
    -45deg,
    #f5e050 0px,
    #f5e050 14px,
    #ffffff 14px,
    #ffffff 28px
  );
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.divider {
  width: 60px;
  height: 2px;
  background: rgba(245,224,80,0.4);
}

.sub {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(13px, 1.6vw, 18px);
  letter-spacing: 8px;
  color: rgba(255,255,255,0.25);
  text-transform: uppercase;
}

/* Animated tape across center */
.tape {
  position: fixed;
  left: -10%; width: 120%;
  height: 44px;
  background: repeating-linear-gradient(
    -45deg,
    #f5e050 0px,
    #f5e050 22px,
    #000    22px,
    #000    44px
  );
  opacity: 0.12;
  top: 50%;
  transform: translateY(-50%) rotate(-1.5deg);
  pointer-events: none;
}

@keyframes fadein {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<div class="stripe-bar top"></div>
<div class="tape"></div>

<div class="content">
  <div class="label">Black Sulphur</div>
  <div class="title">Under<br>Construction</div>
  <div class="divider"></div>
  <div class="sub">Check Back Soon</div>
</div>

<div class="stripe-bar bottom"></div>

</body>
</html>
